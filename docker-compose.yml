services:
  api:
    build: .
    container_name: astra-nexus-api
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
    environment:
      DATABASE_URL: sqlite:///./data/astra_nexus.sqlite3
      DATA_DIR: ./data
      WORKSPACE_BASE_PATH: data/workspaces

  bot:
    build: .
    container_name: astra-nexus-bot
    command: astra-nexus-bot
    profiles:
      - bot
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
    environment:
      DATABASE_URL: sqlite:///./data/astra_nexus.sqlite3
      DATA_DIR: ./data
      WORKSPACE_BASE_PATH: data/workspaces
